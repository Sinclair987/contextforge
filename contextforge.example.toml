# ContextForge configuration

[scanner]
max_file_bytes = 1048576
ignore_patterns = [".git", "target", "node_modules", "dist", "build", "out", "demo-output", "venv"]
include_paths = []
exclude_paths = []

[output]
bundle = "context-bundle.md"
manifest = "context-manifest.json"
report = "context-report.md"
